<svg xmlns="http://www.w3.org/2000/svg" width="960" height="960" viewBox="0 0 960 960" fill="none">
  <defs>
    <!-- Brand Gradient -->
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B57FF"/>
      <stop offset="100%" stop-color="#FE2857"/>
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="logoShadow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#9B88B7" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#B7A6CC" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Background removed for transparency -->

  <!-- Logo Circle with Shadow -->
  <circle cx="480" cy="400" r="280" fill="white" filter="url(#logoShadow)"/>

  <!-- Lightning Bolt -->
  <g transform="translate(160, 80) scale(16)">
     <path d="M22 23H26L18 30V22H14L22 10V23Z" fill="url(#brandGradient)"/>
  </g>

  <!-- Title Text -->
  <text x="480" y="780" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="48" fill="url(#brandGradient)" letter-spacing="-0.5">MCP Steroid</text>

  <!-- Tagline Text -->
  <text x="480" y="830" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="20" fill="#666666">Give AI the whole IDE, not just the files</text>
  
  <!-- Social Text -->
  <text x="480" y="870" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="400" font-size="16" fill="#888888">follow @jonnyzzz and https://linkedin.com/in/jonnyzzz</text>
  
  <!-- Footer Note (from original image "Give AI the whole IDE, not just the files" is actually the tagline) -->
  <!-- The faint text at the very bottom "MCP Steroid" and "Give AI..." in the original PNG reference -->
  <!-- Wait, looking at the first image, there was tiny text at the very bottom: "MCP Steroid" and "Give AI...". -->
  <!-- I will stick to the main visible elements: Title and Tagline below the logo. -->
</svg>
