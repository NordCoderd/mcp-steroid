<svg xmlns="http://www.w3.org/2000/svg" width="800" height="880" viewBox="0 0 800 880" fill="none">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B57FF"/>
      <stop offset="100%" stop-color="#FE2857"/>
    </linearGradient>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#9B88B7" flood-opacity="0.24"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#B7A6CC" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Semi-transparent background -->
  <rect width="800" height="880" rx="48" fill="white" fill-opacity="0.65"/>

  <!-- Logo circle with shadow -->
  <circle cx="400" cy="340" r="246" fill="#A994C3" fill-opacity="0.14"/>
  <circle cx="400" cy="334" r="240" fill="white" stroke="#E8E2EE" stroke-width="1.5" filter="url(#logoShadow)"/>

  <!-- Lightning Bolt -->
  <g transform="translate(400, 334) scale(13.7) translate(-20, -20)">
    <path d="M22 23H26L18 30V22H14L22 10V23Z" fill="url(#brandGradient)"/>
  </g>

  <!-- Title -->
  <text x="400" y="650" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" font-weight="700" font-size="42" fill="url(#brandGradient)" letter-spacing="-0.5">MCP Steroid</text>

  <!-- Tagline -->
  <text x="400" y="700" text-anchor="middle" font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace" font-weight="400" font-size="17" fill="#666666">Give AI the whole IDE, not just the files</text>

  <!-- Social -->
  <text x="400" y="780" text-anchor="middle" font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace" font-weight="400" font-size="13" fill="#888888">follow @jonnyzzz</text>
  <text x="400" y="808" text-anchor="middle" font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace" font-weight="400" font-size="13" fill="#888888">https://linkedin.com/in/jonnyzzz</text>
</svg>
