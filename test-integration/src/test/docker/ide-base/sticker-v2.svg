<svg xmlns="http://www.w3.org/2000/svg" width="440" height="580" viewBox="0 0 440 580" fill="none">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B57FF"/>
      <stop offset="100%" stop-color="#FE2857"/>
    </linearGradient>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9B88B7" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#B7A6CC" flood-opacity="0.30"/>
    </filter>
    <!-- Clip all content to the organic sticker shape -->
    <clipPath id="stickerClip">
      <path d="M 220 5
               C 340 5, 420 80, 422 185
               C 424 290, 420 380, 415 440
               C 410 500, 395 530, 360 548
               C 320 565, 265 572, 220 572
               C 175 572, 120 565, 80 548
               C 45 530, 30 500, 25 440
               C 20 380, 16 290, 18 185
               C 20 80, 100 5, 220 5 Z"/>
    </clipPath>
  </defs>

  <!-- Sticker body: smooth organic die-cut shape -->
  <path d="M 220 5
           C 340 5, 420 80, 422 185
           C 424 290, 420 380, 415 440
           C 410 500, 395 530, 360 548
           C 320 565, 265 572, 220 572
           C 175 572, 120 565, 80 548
           C 45 530, 30 500, 25 440
           C 20 380, 16 290, 18 185
           C 20 80, 100 5, 220 5 Z"
        fill="white" stroke="#E0D8E8" stroke-width="1"/>

  <!-- All content clipped to sticker outline -->
  <g clip-path="url(#stickerClip)">
    <!-- Soft shadow ring behind logo circle -->
    <circle cx="220" cy="190" r="148" fill="#A994C3" fill-opacity="0.10"/>

    <!-- Logo circle with drop shadow -->
    <circle cx="220" cy="185" r="140" fill="white" stroke="#E8E2EE" stroke-width="1.2" filter="url(#logoShadow)"/>

    <!-- Lightning Bolt -->
    <g transform="translate(220, 185) scale(8) translate(-20, -20)">
      <path d="M22 23H26L18 30V22H14L22 10V23Z" fill="url(#brandGradient)"/>
    </g>

    <!-- Title -->
    <text x="220" y="390" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="36" fill="url(#brandGradient)" letter-spacing="-0.5">MCP Steroid</text>

    <!-- Tagline -->
    <text x="220" y="425" text-anchor="middle"
          font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace"
          font-weight="400" font-size="13.5" fill="#666666">Give AI the whole IDE, not just the files</text>

    <!-- Subtle separator -->
    <line x1="130" y1="456" x2="310" y2="456" stroke="#E8E2EE" stroke-width="1"/>

    <!-- Social -->
    <text x="220" y="489" text-anchor="middle"
          font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace"
          font-weight="400" font-size="12" fill="#888888">follow @jonnyzzz</text>
    <text x="220" y="513" text-anchor="middle"
          font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace"
          font-weight="400" font-size="12" fill="#888888">linkedin.com/in/jonnyzzz</text>
  </g>
</svg>
