<svg xmlns="http://www.w3.org/2000/svg" width="440" height="565" viewBox="0 0 440 565" fill="none">
  <defs>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6B57FF"/>
      <stop offset="100%" stop-color="#FE2857"/>
    </linearGradient>
    <filter id="logoShadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#9B88B7" flood-opacity="0.22"/>
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#B7A6CC" flood-opacity="0.30"/>
    </filter>
    <clipPath id="stickerClip">
      <use href="#stickerBody"/>
    </clipPath>
  </defs>

  <!-- Tighter organic shape: hugs circle at top, slight waist, widens for tagline, tapers at bottom -->
  <path id="stickerBody"
        d="M 220 2
           C 320 2, 400 40, 412 120
           C 424 200, 424 260, 418 320
           C 412 375, 420 405, 418 435
           C 414 480, 380 525, 325 543
           C 282 558, 245 560, 220 560
           C 195 560, 158 558, 115 543
           C 60 525, 26 480, 22 435
           C 20 405, 28 375, 22 320
           C 16 260, 16 200, 28 120
           C 40 40, 120 2, 220 2 Z"
        fill="white" stroke="#E0D8E8" stroke-width="1"/>

  <g clip-path="url(#stickerClip)">
    <!-- Soft shadow ring -->
    <circle cx="220" cy="190" r="148" fill="#A994C3" fill-opacity="0.10"/>

    <!-- Logo circle -->
    <circle cx="220" cy="185" r="140" fill="white" stroke="#E8E2EE" stroke-width="1.2" filter="url(#logoShadow)"/>

    <!-- Lightning Bolt -->
    <g transform="translate(220, 185) scale(8) translate(-20, -20)">
      <path d="M22 23H26L18 30V22H14L22 10V23Z" fill="url(#brandGradient)"/>
    </g>

    <!-- Title -->
    <text x="220" y="388" text-anchor="middle"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-weight="700" font-size="36" fill="url(#brandGradient)" letter-spacing="-0.5">MCP Steroid</text>

    <!-- Tagline -->
    <text x="220" y="423" text-anchor="middle"
          font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace"
          font-weight="400" font-size="13" fill="#666666">Give AI the whole IDE, not just the files</text>

    <!-- Subtle separator -->
    <line x1="140" y1="452" x2="300" y2="452" stroke="#E8E2EE" stroke-width="1"/>

    <!-- Social -->
    <text x="220" y="482" text-anchor="middle"
          font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace"
          font-weight="400" font-size="11.5" fill="#888888">follow @jonnyzzz</text>
    <text x="220" y="505" text-anchor="middle"
          font-family="'JetBrains Mono', 'JetBrains-Mono-Regular', monospace"
          font-weight="400" font-size="11.5" fill="#888888">linkedin.com/in/jonnyzzz</text>
  </g>
</svg>
