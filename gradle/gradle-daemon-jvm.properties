#
# Pinning the Gradle daemon JVM to Java 21 means the daemon no longer inherits
# whatever JVM happens to be on PATH / JAVA_HOME (my workstation defaults to
# Corretto 25, which `./gradlew --version` was reporting under "Daemon JVM:").
# All project modules already target JDK 21 via `kotlin { jvmToolchain(21) }`,
# so aligning the daemon itself removes a class of "works on CI, not locally"
# surprises from JVM / Kotlin version skew.
#
# Local JDK 21 gets auto-discovered from the usual install roots
# (~/Library/Java/JavaVirtualMachines, /Library/Java/JavaVirtualMachines, …).
# The foojay-resolver-convention plugin declared in settings.gradle.kts acts
# as a fallback: if no compatible JDK is found locally, Gradle downloads one.
#
# See https://docs.gradle.org/current/userguide/gradle_daemon.html#sec:daemon_jvm_criteria
#
toolchainVersion=21
