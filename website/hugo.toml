languageCode = 'en-us'
title = 'MCP Steroid - Give AI the whole IDE, not just the files'
disableKinds = ['taxonomy', 'term']

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[menus]
  [[menus.main]]
    name = "Home"
    url = "/"
    weight = 1
  [[menus.main]]
    name = "Docs"
    url = "/docs/"
    weight = 2
  [[menus.main]]
