    weight = 6

[params]
  description = "MCP Steroid is a Model Context Protocol server for JetBrains IDEs. It exposes IntelliJ Platform APIs, visual state, and runtime environment to any MCP-compatible AI agent via Kotlin code execution and screenshot capture."
  playlistUrl = "https://www.youtube.com/playlist?list=PLitZWClhc4Qgz3w8qrtctMR_lpIc81n0f"
  githubUrl = "https://github.com/jonnyzzz/mcp-steroid"
  githubIssuesUrl = "https://github.com/jonnyzzz/mcp-steroid/issues"
  youtubeChannel = "https://youtube.com/@jonnyzzz"
  # Version is read from ../VERSION file during build (see Makefile)
  version = "0.87.0"

