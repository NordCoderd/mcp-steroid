name: Build Plugin

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-plugin-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker build image
        run: docker build -t mcp-steroid-build:ci docker/build

      - name: Compute plugin version
        id: version
        run: |
          set -euo pipefail
          base="$(tr -d '[:space:]' < VERSION)"
          # Replace the last dot-separated component with (237 + github.run_number).
          # VERSION is typically MAJOR.MINOR.0; we want MAJOR.MINOR.(237 + run_number).
          prefix="${base%.*}"
          patch=$(( 237 + ${{ github.run_number }} ))
          new_version="${prefix}.${patch}"
          printf '%s\n' "$new_version" > VERSION
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "Plugin base version: ${new_version}"

      - name: Build plugin (Docker)
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.gradle-home"
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GRADLE_USER_HOME=/build/.gradle-home \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            mcp-steroid-build:ci \
            ./gradlew :ij-plugin:buildPlugin \
              -Pmcp.gh.build=true \
              --no-daemon \
              --stacktrace

      - name: List produced distributions
        run: ls -la ij-plugin/build/distributions/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-steroid-plugin-${{ steps.version.outputs.version }}
          path: ij-plugin/build/distributions/*.zip
          if-no-files-found: error
