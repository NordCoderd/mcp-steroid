name: Build Plugin

on:
  push:
    branches: [main]
  # PR commits don't auto-trigger — use `workflow_dispatch` with the PR's head
  # branch to kick a build explicitly when you want one. This keeps the Actions
  # quota focused on main (where the published plugin lives) and avoids racing
  # builds on noisy PR branches.
  workflow_dispatch:

concurrency:
  # One run per ref. A new push to the same ref (main or a branch we explicitly
  # dispatched against) cancels the in-flight outdated one — earlier bytes are
  # never published, so there's no build record to preserve.
  group: build-plugin-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript actions (actions/checkout, actions/upload-artifact) onto Node 24.
# Node 20 is deprecated on GitHub-hosted runners and will be removed 2026-09-16.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

# The workflow is split into independent jobs that mirror what we have on
# buildserver.labs.intellij.net (TeamCity) for the same project:
#
#   build-number  ←  `build number`     (pure version-string emitter)
#   test          ←  `ij-plugin test`   (runs :buildPluginTests)
#   build-plugin  ←  `build plugin`     (packages the .zip via buildPluginOnCI)
#
# Each job gets its own runner, its own `actions/checkout`, and its own
# `docker/build` image build. That's some duplicated CPU, but it keeps each
# job independently re-runnable and makes room for additional jobs (plugin
# verifier, website, release compat matrix, …) to hang off `needs:
# build-number` in parallel without turning the file into a single giant
# linear recipe.
jobs:
  build-number:
    name: build number
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      # Downstream jobs read the computed version via ${{ needs.build-number.outputs.version }}.
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute plugin build number
        id: version
        # Mirrors the `build number` TC config: <VERSION>.<run-counter>-gh-<short-sha>.
        # build.gradle.kts asserts this exact format (`mcp.build.version` regex).
        run: |
          set -euo pipefail
          base="$(tr -d '[:space:]' < VERSION)"
          hash="$(git rev-parse --short HEAD)"
          counter="${{ github.run_number }}"
          new_version="${base}.${counter}-gh-${hash}"
          echo "version=${new_version}" >> "$GITHUB_OUTPUT"
          echo "Plugin build number: ${new_version}"

  test:
    name: test
    needs: build-number
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker build image
        run: docker build -t mcp-steroid-build:ci docker/build

      - name: Run :test of every plugin module (Docker)
        # Same `buildPluginTests` aggregator TeamCity runs for its per-OS
        # `ij-plugin test (Linux|Windows|macOS)` configurations — keeps GH
        # Actions and buildserver.labs.intellij.net in lockstep on what
        # "plugin tests" means. Exclusion list lives in the root
        # build.gradle.kts (`nonPluginTestSubprojects`), so scoping changes
        # are a one-line edit there with no CI changes.
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.gradle-home"
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GRADLE_USER_HOME=/build/.gradle-home \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            mcp-steroid-build:ci \
            ./gradlew buildPluginTests \
              --no-daemon \
              --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ needs.build-number.outputs.version }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 14

  build-plugin:
    name: build plugin
    # Tests gate the package build: a regression fails the pipeline before we
    # spend time packaging a broken plugin zip.
    needs: [build-number, test]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker build image
        run: docker build -t mcp-steroid-build:ci docker/build

      - name: Build plugin (Docker)
        # Gradle picks up the full version string from the BUILD_NUMBER env var
        # (build.gradle.kts falls back to it when -Pmcp.build.version is unset,
        # requiring a dash to distinguish it from a raw CI counter). Keeps GH
        # and TeamCity on the same code path — TC gets BUILD_NUMBER from its
        # buildNumberPattern; here we set it explicitly from the upstream job.
        env:
          BUILD_NUMBER: ${{ needs.build-number.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.gradle-home"
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GRADLE_USER_HOME=/build/.gradle-home \
            -e BUILD_NUMBER \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            mcp-steroid-build:ci \
            ./gradlew buildPluginOnCI \
              --no-daemon \
              --stacktrace

      - name: List produced distributions
        run: ls -la ij-plugin/build/distributions/

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: mcp-steroid-plugin-${{ needs.build-number.outputs.version }}
          path: ij-plugin/build/distributions/*.zip
          if-no-files-found: error
