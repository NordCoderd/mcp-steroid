name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'VERSION'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # New commit → cancel the in-flight Pages build. Only the latest bytes ever
  # get deployed, so earlier runs finishing is wasted effort.
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build website
        working-directory: website
        run: make build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: website/mcp-steroid-public/mcp-steroid-plugin/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
