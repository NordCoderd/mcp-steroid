name: Test Plugin

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  # One ref (branch or PR) → one active run. New pushes cancel the in-flight
  # outdated one (safe; tests are deterministic and reruns are cheap), while
  # pushes to main stay on their own ref group alongside build-plugin.
  group: test-plugin-${{ github.ref }}
  cancel-in-progress: true

# Opt JavaScript actions onto Node 24 (matches build-plugin.yml).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Docker build image
        run: docker build -t mcp-steroid-build:ci docker/build

      - name: Run :test of every plugin module (Docker)
        # Uses the same `buildPluginTests` aggregator that TeamCity runs for
        # its per-OS `ij-plugin test (Linux|Windows|macOS)` configurations, so
        # GitHub Actions and buildserver.labs.intellij.net stay in lockstep on
        # what "plugin tests" means. The exclusion list (test-helper,
        # test-integration, test-experiments, npx, npx-kt) lives in the root
        # build.gradle.kts — see `nonPluginTestSubprojects`.
        run: |
          set -euo pipefail
          mkdir -p "$GITHUB_WORKSPACE/.gradle-home"
          docker run --rm \
            -u "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -e GRADLE_USER_HOME=/build/.gradle-home \
            -v "$GITHUB_WORKSPACE:/build" \
            -w /build \
            mcp-steroid-build:ci \
            ./gradlew buildPluginTests \
              --no-daemon \
              --stacktrace

      - name: Upload test reports (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 14
